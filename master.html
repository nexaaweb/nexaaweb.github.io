<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Portfolio</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family: 'Segoe UI', sans-serif;
    background:#0f0f14;
    color:white;
    overflow-x:hidden;
}

/* ================= LOADER ================= */

#loader{
    position:fixed;
    width:100%;
    height:100vh;
    background:#0f0f14;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loader-text{
    font-size:42px;
    letter-spacing:5px;
}

.loader-bar{
    position:absolute;
    bottom:40%;
    width:0;
    height:4px;
    background:#ff4c4c;
}

/* ================= NAVBAR ================= */

.navbar{
    position:fixed;
    width:100%;
    padding:20px 60px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.05);
    display:flex;
    justify-content:space-between;
    z-index:1000;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    transition:0.3s;
}

.navbar a:hover{
    color:#ff4c4c;
}

/* ================= PARTICLE BACKGROUND ================= */

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* ================= SECTIONS ================= */

section{
    min-height:100vh;
    padding:120px 10%;
    position:relative;
}

/* HERO */

.hero{
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.hero h1{
    font-size:60px;
}

.hero p{
    margin-top:20px;
    color:#aaa;
}

/* ROTATING SERVICES */

.services-circle{
    position:relative;
    width:400px;
    height:400px;
    margin:auto;
    border-radius:50%;
}

.service-item{
    position:absolute;
    width:120px;
    text-align:center;
}

/* LAPTOP MOCKUP */

.laptop{
    width:500px;
    height:300px;
    border:8px solid #333;
    border-radius:15px;
    margin:auto;
    overflow:hidden;
    background:black;
}

.screen{
    width:100%;
    height:100%;
    background:linear-gradient(45deg,#ff4c4c,#aa2cff);
}

/* 3D DEPTH */

.depth{
    transform-style:preserve-3d;
    perspective:1000px;
}

/* GLASS CARD */

.glass{
    background:rgba(255,255,255,0.05);
    padding:40px;
    border-radius:20px;
    backdrop-filter:blur(15px);
}

</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
    <div class="loader-text">YourBrand</div>
    <div class="loader-bar"></div>
</div>

<!-- PARTICLES -->
<canvas id="particles"></canvas>

<!-- NAVBAR -->
<div class="navbar">
    <div><b>Brand</b></div>
    <div>
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Portfolio</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- HERO -->
<section class="hero">
    <h1>Premium Digital Experience</h1>
    <p>Modern. Smooth. Futuristic.</p>
</section>

<!-- SERVICES ROTATION -->
<section>
    <div class="services-circle depth">
        <div class="service-item">Web</div>
        <div class="service-item">Branding</div>
        <div class="service-item">Office</div>
        <div class="service-item">Marketing</div>
        <div class="service-item">AI</div>
    </div>
</section>

<!-- LAPTOP BUILD ANIMATION -->
<section>
    <div class="laptop">
        <div class="screen"></div>
    </div>
</section>

<!-- CONTENT -->
<section>
    <div class="glass">
        <h2>Scroll Reveal Section</h2>
        <p>Apple-style smooth animations with depth effect.</p>
    </div>
</section>

<script>

/* LOADER */
gsap.to(".loader-bar",{width:"300px",duration:2});
gsap.to("#loader",{opacity:0,delay:2.3,duration:1,onComplete:()=>{
    document.getElementById("loader").style.display="none";
}});

/* SCROLL REVEAL */
gsap.utils.toArray("section").forEach(sec=>{
    gsap.from(sec,{
        opacity:0,
        y:100,
        duration:1,
        scrollTrigger:{
            trigger:sec,
            start:"top 80%"
        }
    });
});

/* ROTATING SERVICES */
gsap.to(".services-circle",{
    rotation:360,
    repeat:-1,
    duration:20,
    ease:"linear"
});

/* LAPTOP BUILD */
gsap.from(".screen",{
    scaleX:0,
    duration:2,
    scrollTrigger:{
        trigger:".laptop",
        start:"top 70%"
    }
});

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        dx:Math.random()-0.5,
        dy:Math.random()-0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="#ff4c4c";
        ctx.fill();
        p.x+=p.dx;
        p.y+=p.dy;
    });
    requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
