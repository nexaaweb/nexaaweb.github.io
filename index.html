<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexaaWeb | Digital Power</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- GSAP CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body{
background:#000;
color:#fff;
overflow:hidden;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
}

h1{
font-size:60px;
color:#ff0000;
letter-spacing:3px;
}

.tagline{
margin-top:20px;
font-size:20px;
color:#ccc;
}

.service-rotate{
margin-top:40px;
font-size:28px;
font-weight:600;
color:#fff;
height:40px;
overflow:hidden;
}

.circle-bg{
position:absolute;
width:400px;
height:400px;
border-radius:50%;
border:2px solid #ff0000;
animation:spin 20s linear infinite;
opacity:0.2;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.cta{
margin-top:50px;
padding:15px 40px;
background:#ff0000;
border:none;
color:#fff;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

.cta:hover{
background:#fff;
color:#000;
}
</style>
</head>

<body>

<div class="hero">
<div class="circle-bg"></div>

<h1 class="logo">NexaaWeb</h1>
<p class="tagline">We Build Digital Power</p>

<div class="service-rotate">
<span id="changing-text">Website Development</span>
</div>

<button class="cta">Start Your Project</button>

</div>

<script>
const services = [
"Website Development",
"Branding & Identity",
"UI/UX Design",
"SEO & Optimization",
"Digital Growth Strategy"
];

let index = 0;

setInterval(() => {
index = (index + 1) % services.length;
gsap.to("#changing-text", {
opacity:0,
y:-20,
duration:0.5,
onComplete: () => {
document.getElementById("changing-text").innerText = services[index];
gsap.to("#changing-text",{opacity:1,y:0,duration:0.5});
}
});
},2000);

gsap.from(".logo",{y:-100,opacity:0,duration:1});
gsap.from(".tagline",{opacity:0,duration:1,delay:1});
gsap.from(".service-rotate",{opacity:0,duration:1,delay:1.5});
gsap.from(".cta",{opacity:0,duration:1,delay:2});
</script>

</body>
</html>
